<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background: url('download (6).jpg')no-repeat center center fixed;
            background-size: cover;
            background-position: fixed;
            display: flex;
            justify-content: center;
        }
        .wrapper{
            width:300px;
            height: 300px;
            margin-top: 125px;
            background: transparent;
            backdrop-filter: blur(20px);
            border-radius: 40px;
            box-shadow: 0 0 50px rgba(9, 7, 112, 0.5);
            padding: 30px;
            display: flex;
            justify-content: center;
        }
        input{
            margin-top: 20px;
            width: 250px;
            height: 30px;
        }
        button{
            margin-top:20px;
            width: 200px;
            height: 30px;
            margin-left: 25px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }
        button:hover{
            background: linear-gradient(to right, blue, green);
        }


        
    </style>
</head>
<body>
    <div class="wrapper">
        <form>
            <input name="username" type="text" placeholder="Username"><br>
            <input name="password" type="password" placeholder="Password"><br>
            <button id="btn" type="submit">Login</button>
            <p> Don't have an account? <a href="#">Sign up</a></p>
        </form>
    </div>
</body>
</html>
